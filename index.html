<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecli 1 - Ultimate Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --bg: #050505; --surface: #111; --accent: #ffd700; --text: #fff; --msg-my: #ffd700; --msg-other: #1a1a1a; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* AUTH */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .auth-card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; width: 300px; box-shadow: 0 0 20px var(--accent); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #000; }

        /* SIDEBAR */
        #side-menu { position: fixed; left: -310px; top: 0; width: 300px; height: 100%; background: var(--surface); border-right: 1px solid #222; z-index: 2000; display: flex; flex-direction: column; }
        #side-menu.active { left: 0; }
        .menu-header { padding: 20px; border-bottom: 1px solid #222; text-align: center; }
        
        .contacts-area { flex-grow: 1; overflow-y: auto; }
        .contact-item { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .contact-item:hover { background: #1a1a1a; }
        .contact-item.active { background: rgba(255,215,0,0.1); border-left: 4px solid var(--accent); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent); }

        /* CHAT */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; width: 100%; }
        header { background: var(--surface); padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; word-wrap: break-word; }
        .my-message { align-self: flex-end; background: var(--msg-my); color: #000; border-bottom-right-radius: 2px; }
        .other-message { align-self: flex-start; background: var(--msg-other); color: #fff; border-bottom-left-radius: 2px; }
        .sender-name { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 4px; }

        /* INPUT AREA */
        #input-area { padding: 15px; background: var(--surface); display: flex; gap: 10px; align-items: center; }
        #msg-input { flex-grow: 1; background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 20px; outline: none; }
        .icon-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 5px; }
        
        .hidden { display: none !important; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        img.sent-img { max-width: 200px; border-radius: 10px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="font-family:'Orbitron'; color:var(--accent)">ECLI 1</h2>
            <input type="text" id="username" class="auth-input" placeholder="Никнейм">
            <button class="auth-btn" onclick="appAuth()">ВОЙТИ</button>
        </div>
    </div>

    <div id="overlay" onclick="toggleMenu()"></div>
    
    <div id="side-menu">
        <div class="menu-header">
            <div id="nav-name" style="font-weight:bold; font-size: 1.2em; color: var(--accent)">User</div>
            <div id="nav-id" style="font-size:11px; margin-top: 5px; opacity: 0.7;">ID: ----</div>
        </div>
        <div class="contacts-area">
            <div class="contact-item" onclick="addFriend()">➕ Добавить друга по ID</div>
            <div id="contacts-list"></div>
        </div>
    </div>

    <div class="main-content">
        <header>
            <button class="icon-btn" onclick="toggleMenu()">☰</button>
            <div id="chat-title" style="font-family:'Orbitron'; font-size:14px">Выберите чат</div>
        </header>
        <div id="chat-window"></div>
        <div id="input-area" class="hidden">
            <button class="icon-btn" onclick="document.getElementById('f-up').click()">🖼️</button>
            <input type="file" id="f-up" class="hidden" accept="image/*" onchange="sendImg(this)">
            <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendText()">
            <button id="send-btn" class="icon-btn" onclick="sendText()">➤</button>
        </div>
    </div>

    <script>
        // ТВОИ КЛЮЧИ (НЕ МЕНЯЕМ)
        const firebaseConfig = {
            apiKey: "AIzaSyBKbnXKGct2AegbAT2-XcNXGFfrOtXiFuY",
            authDomain: "ecli-1-51c71.firebaseapp.com",
            databaseURL: "https://ecli-1-51c71-default-rtdb.firebaseio.com",
            projectId: "ecli-1-51c71",
            storageBucket: "ecli-1-51c71.appspot.com",
            messagingSenderId: "262595056485",
            appId: "1:262595056485:web:f7afac4c57f109dc7bc78c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let me = JSON.parse(sessionStorage.getItem('ecli_user')) || null;
        let targetID = null;
        let friends = JSON.parse(localStorage.getItem('ecli_friends')) || [];

        function appAuth() {
            const n = document.getElementById('username').value.trim();
            if(!n) return;
            const id = Math.random().toString(36).substring(2,7).toUpperCase();
            me = { n, id };
            sessionStorage.setItem('ecli_user', JSON.stringify(me));
            location.reload();
        }

        function addFriend() {
            const id = prompt("Введите ID друга:").toUpperCase();
            if(!id || id === me.id) return;
            if(!friends.find(f => f.id === id)) {
                friends.push({id, n: 'Друг ' + id});
                localStorage.setItem('ecli_friends', JSON.stringify(friends));
                renderFriends();
            }
        }

        function renderFriends() {
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            friends.forEach(f => {
                list.innerHTML += `
                    <div class="contact-item ${targetID === f.id ? 'active' : ''}" onclick="openChat('${f.id}','${f.n}')">
                        <div class="avatar">${f.n[0]}</div>
                        <div><b>${f.n}</b><br><small>ID: ${f.id}</small></div>
                    </div>`;
            });
        }

        function openChat(id, name) {
            targetID = id;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('input-area').classList.remove('hidden');
            renderFriends();
            toggleMenu();
            loadHistory();
        }

        function sendText() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val || !targetID) return;
            
            const msg = { type: 'text', content: val, from: me.id, fromName: me.n, stamp: Date.now() };
            db.ref('messages/' + targetID).push(msg);
            db.ref('history/' + me.id + '/' + targetID).push({...msg, isMine: true});
            
            displayMsg({...msg, isMine: true});
            input.value = '';
        }

        function sendImg(input) {
            const file = input.files[0];
            if(!file || !targetID) return;
            const ref = storage.ref('chats/' + Date.now() + file.name);
            ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
                const msg = { type: 'img', content: url, from: me.id, fromName: me.n, stamp: Date.now() };
                db.ref('messages/' + targetID).push(msg);
                db.ref('history/' + me.id + '/' + targetID).push({...msg, isMine: true});
                displayMsg({...msg, isMine: true});
            });
        }

        function loadHistory() {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            // Подгружаем историю из облака
            db.ref('history/' + me.id + '/' + targetID).limitToLast(50).once('value', s => {
                s.forEach(child => displayMsg(child.val()));
            });
            // Слушаем новые сообщения в реальном времени
            db.ref('messages/' + me.id).on('child_added', s => {
                const m = s.val();
                if(m.from === targetID) {
                    displayMsg({...m, isMine: false});
                    // Сохраняем в историю, чтобы не пропало
                    db.ref('history/' + me.id + '/' + targetID).push({...m, isMine: false});
                    s.ref.remove(); // Удаляем из очереди "входящих"
                }
            });
        }

        function displayMsg(m) {
            const win = document.getElementById('chat-window');
            const d = document.createElement('div');
            d.className = `message ${m.isMine ? 'my-message' : 'other-message'}`;
            
            if(m.type === 'text') d.innerText = m.content;
            if(m.type === 'img') d.innerHTML = `<img class="sent-img" src="${m.content}">`;
            
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
            document.getElementById('overlay').style.display = document.getElementById('side-menu').classList.contains('active') ? 'block' : 'none';
        }

        if(me) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('nav-name').innerText = me.n;
            document.getElementById('nav-id').innerText = "ТВОЙ ID: " + me.id;
            renderFriends();
        }
    </script>
</body>
</html>
