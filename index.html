<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ecli Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body { background: #000; color: #ff6600; font-family: 'Courier New', monospace; padding: 20px; }
        #chat-window { height: 300px; border: 2px solid #ff6600; overflow-y: auto; padding: 10px; margin-bottom: 10px; box-shadow: 0 0 15px #ff6600; background: #050505; }
        input, button { background: #111; color: #ff6600; border: 1px solid #ff6600; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button:active { background: #ff6600; color: #000; }
        .msg { margin: 8px 0; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        .my-msg { color: #00ff00; text-align: right; }
        b { color: #fff; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Ecli Messenger v1.0</h2>

    <div id="auth">
        <input type="text" id="username" placeholder="Введи свое имя...">
        <button onclick="start()">ВОЙТИ В ЧАТ</button>
    </div>

    <div id="chat" style="display:none;">
        <p style="font-size: 0.8em;">Твой ID для связи: <b id="my-id" style="color:#ff6600; font-size: 1.5em;"></b></p>
        <input type="text" id="friend-id" placeholder="Вставь ID друга...">
        <div id="chat-window"></div>
        <input type="text" id="msg-input" placeholder="Напиши сообщение...">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>

<script>
    // Твои данные из Firebase (с фото)
    const firebaseConfig = {
        apiKey: "AIzaSyBKbnXKGct2AegbAT2-XcNXGFfrOtXiFuY",
        authDomain: "ecli-1-51c71.firebaseapp.com",
        databaseURL: "https://ecli-1-51c71-default-rtdb.firebaseio.com",
        projectId: "ecli-1-51c71",
        storageBucket: "ecli-1-51c71.appspot.com",
        messagingSenderId: "262595056485",
        appId: "1:262595056485:web:f7afac4c57f109dc7bc78c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let userData = { name: '', id: '' };

    function start() {
        const nameInput = document.getElementById('username').value;
        if (!nameInput) return alert("Введи имя!");
        
        userData.name = nameInput;
        userData.id = Math.random().toString(36).substring(2, 7).toUpperCase();
        
        document.getElementById('auth').style.display = 'none';
        document.getElementById('chat').style.display = 'block';
        document.getElementById('my-id').innerText = userData.id;

        // Слушаем сообщения, которые приходят НАМ
        db.ref('chats/' + userData.id).on('child_added', (snapshot) => {
            renderMessage(snapshot.val(), false);
        });
    }

    function send() {
        const friendId = document.getElementById('friend-id').value.trim().toUpperCase();
        const text = document.getElementById('msg-input').value;
        if (!friendId || !text) return;

        const message = {
            sender: userData.name,
            text: text,
            fromId: userData.id
        };

        // Отправляем сообщение в ветку друга
        db.ref('chats/' + friendId).push(message);
        
        // Показываем сообщение у себя
        renderMessage(message, true);
        document.getElementById('msg-input').value = '';
    }

    function renderMessage(m, isMy) {
        const win = document.getElementById('chat-window');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg' + (isMy ? ' my-msg' : '');
        msgDiv.innerHTML = `<b>${m.sender}:</b> ${m.text}`;
        win.appendChild(msgDiv);
        win.scrollTop = win.scrollHeight;
    }
</script>

</body>
</html>
