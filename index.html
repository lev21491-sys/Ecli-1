<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECLI 1 - ULTIMATE (NO STORAGE)</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --bg: #050505; --surface: #111; --accent: #ffd700; --text: #fff; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Боковое меню */
        #side-menu { width: 280px; background: var(--surface); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .menu-header { padding: 20px; border-bottom: 1px solid #222; text-align: center; font-family: 'Orbitron'; color: var(--accent); }
        .contact-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; }
        .contact-item:hover { background: #1a1a1a; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Основная часть */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        header { padding: 15px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #000; }
        
        /* Сообщения */
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 2px; }

        /* Поле ввода */
        #input-area { padding: 15px; background: var(--surface); display: flex; gap: 10px; align-items: center; }
        #msg-input { flex-grow: 1; background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 25px; outline: none; }
        .btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; }
        
        #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="side-menu">
        <div class="menu-header">ECLI 1 PRO</div>
        <div class="contact-item" onclick="addFriend()">➕ Добавить ID</div>
        <div id="contacts-list"></div>
    </div>

    <div class="chat-area">
        <header>
            <div id="target-name">Выберите чат</div>
            <div id="call-btns" class="hidden">
                <button class="btn" onclick="makeCall('audio')">📞</button>
                <button class="btn" onclick="makeCall('video')">📹</button>
            </div>
        </header>
        <div id="chat-window"></div>
        <div id="input-area" class="hidden">
            <input type="file" id="file-up" class="hidden" accept="image/*" onchange="sendPhoto(this)">
            <button class="btn" onclick="document.getElementById('file-up').click()">🖼️</button>
            <input type="text" id="msg-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendText()">
            <button class="btn" onmousedown="startVoice()" onmouseup="stopVoice()">🎤</button>
            <button class="btn" onclick="sendText()">➤</button>
        </div>
    </div>

    <div id="call-overlay">
        <h2 style="color:var(--accent)">ИДЕТ ВЫЗОВ...</h2>
        <div id="call-info"></div>
        <button onclick="endCall()" style="margin-top:20px; padding:15px 30px; background:red; color:white; border:none; border-radius:10px; cursor:pointer;">СБРОСИТЬ</button>
    </div>

    <script>
        // ТВОЙ КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyBKbnXKGct2AegbAT2-XcNXGFfrOtXiFuY",
            databaseURL: "https://ecli-1-51c71-default-rtdb.firebaseio.com",
            projectId: "ecli-1-51c71",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Простая авторизация (чтобы не усложнять)
        let userName = localStorage.getItem('ecli_user') || prompt("Твоё имя:");
        if(userName) localStorage.setItem('ecli_user', userName);
        let myID = userName.toLowerCase().replace(/\s/g, '');
        let targetID = null;

        function addFriend() {
            let id = prompt("Введите ID друга (его имя маленькими буквами):");
            if(id) {
                db.ref(`friends/${myID}/${id}`).set({id: id, n: id.toUpperCase()});
                renderFriends();
            }
        }

        function renderFriends() {
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const f = child.val();
                    list.innerHTML += `<div class="contact-item" onclick="selectChat('${f.id}')">
                        <div class="avatar">${f.n[0]}</div>
                        <div>${f.n}</div>
                    </div>`;
                });
            });
        }

        function selectChat(id) {
            targetID = id;
            document.getElementById('target-name').innerText = "Чат с: " + id.toUpperCase();
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('call-btns').classList.remove('hidden');
            loadMessages();
        }

        function sendText() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            const chatKey = myID < targetID ? myID + "_" + targetID : targetID + "_" + myID;
            db.ref(`chats/${chatKey}`).push({ from: myID, type: 'text', content: input.value });
            input.value = '';
        }

        // ФУНКЦИЯ ФОТО БЕЗ STORAGE
        function sendPhoto(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const chatKey = myID < targetID ? myID + "_" + targetID : targetID + "_" + myID;
                db.ref(`chats/${chatKey}`).push({ from: myID, type: 'img', content: e.target.result });
            };
            reader.readAsDataURL(file);
        }

        // ГОЛОСОВЫЕ БЕЗ STORAGE
        let mediaRec, chunks = [];
        async function startVoice() {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRec = new MediaRecorder(s);
            chunks = [];
            mediaRec.ondataavailable = e => chunks.push(e.data);
            mediaRec.start();
        }
        function stopVoice() {
            if(!mediaRec) return;
            mediaRec.stop();
            mediaRec.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const reader = new FileReader();
                reader.onload = (e) => {
                    const chatKey = myID < targetID ? myID + "_" + targetID : targetID + "_" + myID;
                    db.ref(`chats/${chatKey}`).push({ from: myID, type: 'audio', content: e.target.result });
                };
                reader.readAsDataURL(blob);
            };
        }

        function loadMessages() {
            const chatKey = myID < targetID ? myID + "_" + targetID : targetID + "_" + myID;
            db.ref(`chats/${chatKey}`).on('value', snap => {
                const win = document.getElementById('chat-window');
                win.innerHTML = '';
                snap.forEach(c => {
                    const m = c.val();
                    const d = document.createElement('div');
                    d.className = `msg ${m.from === myID ? 'my' : 'other'}`;
                    if(m.type === 'text') d.innerText = m.content;
                    if(m.type === 'img') d.innerHTML = `<img src="${m.content}" style="width:100%; border-radius:10px;">`;
                    if(m.type === 'audio') d.innerHTML = `<audio src="${m.content}" controls style="width:200px; height:35px;"></audio>`;
                    win.appendChild(d);
                });
                win.scrollTop = win.scrollHeight;
            });
        }

        // ЗВОНКИ
        function makeCall(type) {
            document.getElementById('call-overlay').style.display = 'flex';
            db.ref(`calls/${targetID}`).set({from: myID, type: type});
        }
        function endCall() {
            document.getElementById('call-overlay').style.display = 'none';
            db.ref(`calls/${targetID}`).remove();
        }

        // Слушатель звонков
        db.ref(`calls/${myID}`).on('value', snap => {
            if(snap.exists()) {
                const c = snap.val();
                if(confirm(`Вам звонит ${c.from.toUpperCase()} (${c.type}). Принять?`)) {
                    document.getElementById('call-overlay').style.display = 'flex';
                } else {
                    db.ref(`calls/${myID}`).remove();
                }
            }
        });

        renderFriends();
    </script>
</body>
</html>
