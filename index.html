<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECLI 1 PRO - FIXED</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e11; 
            --panel: #1c2126; 
            --accent: #ffd700; 
            --text: #ffffff;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, sans-serif; overflow: hidden;
        }

        /* Экран входа */
        #auth-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; align-items: center; justify-content: center; padding: 20px; 
        }
        .auth-card { 
            background: var(--panel); width: 100%; max-width: 350px; 
            padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--accent);
        }

        /* Основной контейнер */
        #app { display: flex; width: 100%; height: 100%; position: relative; }

        /* Боковая панель (Список друзей) */
        #sidebar { 
            width: 100%; height: 100%; background: var(--bg); 
            position: absolute; z-index: 100; transition: 0.3s ease;
            display: flex; flex-direction: column;
        }
        #sidebar.hidden { transform: translateX(-100%); }

        .header { 
            padding: 15px; height: 70px; display: flex; align-items: center; gap: 12px; 
            background: var(--panel); border-bottom: 1px solid #333; 
        }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }

        /* Область чата */
        #chat-window { 
            flex-grow: 1; display: flex; flex-direction: column; 
            background: var(--bg); height: 100%; width: 100%;
        }

        #messages { 
            flex-grow: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            padding-bottom: 20px;
        }

        .msg { 
            max-width: 75%; padding: 10px 14px; border-radius: 18px; 
            font-size: 15px; line-height: 1.4; word-wrap: break-word;
        }
        .msg.my { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--panel); color: #fff; border-bottom-left-radius: 2px; }
        .msg img { width: 100%; border-radius: 10px; margin-top: 5px; }

        /* НИЖНЯЯ ПАНЕЛЬ ВВОДА (ПОДНЯТА ВЫШЕ) */
        .input-area { 
            padding: 10px 15px;
            padding-bottom: calc(var(--safe-bottom) + 10px); 
            background: var(--panel); 
            display: flex; align-items: center; gap: 8px;
            border-top: 1px solid #333;
        }

        #msg-input { 
            flex-grow: 1; background: var(--bg); border: 1px solid #444; 
            padding: 10px 15px; border-radius: 20px; color: #fff; outline: none;
        }

        .btn-icon { 
            background: none; border: none; color: var(--accent); 
            font-size: 22px; cursor: pointer; display: flex; align-items: center; 
        }
        
        .btn-send { 
            background: var(--accent); color: #000; width: 40px; height: 40px; 
            border-radius: 50%; border: none; font-size: 18px; font-weight: bold;
        }

        /* Запись голоса */
        .recording { color: #ff4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">ECLI 1 PRO</h2>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-send" style="width:100%; border-radius:10px" onclick="handleAuth()">ВХОД</button>
            <p onclick="swapMode()" style="font-size:12px; margin-top:15px; opacity:0.6">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="header">
                <img id="my-ava" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <b id="my-name">...</b>
                <button onclick="logout()" style="margin-left:auto; color:red; background:none; border:none">Выйти</button>
            </div>
            <div style="padding:10px"><button onclick="addFriend()" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--accent); background:none; color:var(--accent)">+ Добавить друга</button></div>
            <div id="contacts-list" style="overflow-y:auto"></div>
        </div>

        <div id="chat-window">
            <div class="header">
                <button class="btn-icon" onclick="showSidebar()">◀</button>
                <img id="chat-ava" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <b id="chat-name">Выберите чат</b>
            </div>
            <div id="messages"></div>
            <div class="input-area hidden" id="input-bar">
                <input type="file" id="file-in" class="hidden" accept="image/*" onchange="sendPhoto()">
                <button class="btn-icon" onclick="document.getElementById('file-in').click()">🖼️</button>
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button id="voice-btn" class="btn-icon" onclick="toggleVoice()">🎤</button>
                <button class="btn-send" onclick="sendText()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKbnXKGct2AegbAT2-XcNXGFfrOtXiFuY",
            databaseURL: "https://ecli-1-51c71-default-rtdb.firebaseio.com",
            projectId: "ecli-1-51c71",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let me = null, target = null, isLogin = true;
        let mediaRecorder, audioChunks = [], isRecording = false;

        function swapMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Вход" : "Регистрация";
        }

        async function handleAuth() {
            const n = document.getElementById('nick').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            if(!n || !p) return;
            const ref = db.ref('users/' + n);
            const snap = await ref.once('value');
            if(isLogin) {
                if(!snap.exists() || snap.val().pass !== p) return alert("Ошибка!");
                me = snap.val();
            } else {
                if(snap.exists()) return alert("Ник занят!");
                me = { nick: n, pass: p, ava: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
                await ref.set(me);
            }
            localStorage.setItem('ecli_v2', JSON.stringify(me));
            location.reload();
        }

        const saved = localStorage.getItem('ecli_v2');
        if(saved) {
            me = JSON.parse(saved);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('my-name').innerText = me.nick.toUpperCase();
            loadContacts();
        }

        function showSidebar() { document.getElementById('sidebar').classList.remove('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }

        function addFriend() {
            const f = prompt("Ник друга:").toLowerCase();
            if(f) db.ref(`friends/${me.nick}/${f}`).set({ nick: f });
        }

        function loadContacts() {
            db.ref(`friends/${me.nick}`).on('value', snap => {
                const list = document.getElementById('contacts-list');
                list.innerHTML = '';
                snap.forEach(c => {
                    const name = c.key;
                    list.innerHTML += `<div style="padding:15px; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px" onclick="openChat('${name}')">
                        <div class="avatar" style="background:#444; display:flex; align-items:center; justify-content:center">${name[0].toUpperCase()}</div>
                        <b>${name.toUpperCase()}</b>
                    </div>`;
                });
            });
        }

        function openChat(name) {
            target = name;
            document.getElementById('chat-name').innerText = name.toUpperCase();
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('input-bar').classList.remove('hidden');
            loadMsgs();
        }

        function sendText() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || !target) return;
            const key = me.nick < target ? me.nick+'_'+target : target+'_'+me.nick;
            db.ref(`chats/${key}`).push({ from: me.nick, type: 'text', val: input.value });
            input.value = '';
        }

        function sendPhoto() {
            const file = document.getElementById('file-in').files[0];
            const reader = new FileReader();
            reader.onload = () => {
                const key = me.nick < target ? me.nick+'_'+target : target+'_'+me.nick;
                db.ref(`chats/${key}`).push({ from: me.nick, type: 'img', val: reader.result });
            };
            reader.readAsDataURL(file);
        }

        // УЛУЧШЕННЫЕ ГОЛОСОВЫЕ
        async function toggleVoice() {
            const btn = document.getElementById('voice-btn');
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = () => {
                            const key = me.nick < target ? me.nick+'_'+target : target+'_'+me.nick;
                            db.ref(`chats/${key}`).push({ from: me.nick, type: 'voice', val: reader.result });
                        };
                        reader.readAsDataURL(blob);
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording');
                } catch (err) { alert("Нет доступа к микрофону"); }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
            }
        }

        function loadMsgs() {
            const key = me.nick < target ? me.nick+'_'+target : target+'_'+me.nick;
            db.ref(`chats/${key}`).on('value', snap => {
                const win = document.getElementById('messages');
                win.innerHTML = '';
                snap.forEach(c => {
                    const m = c.val();
                    const div = document.createElement('div');
                    div.className = `msg ${m.from === me.nick ? 'my' : 'other'}`;
                    if(m.type === 'text') div.innerText = m.val;
                    if(m.type === 'img') div.innerHTML = `<img src="${m.val}" style="width:100%">`;
                    if(m.type === 'voice') div.innerHTML = `<audio src="${m.val}" controls style="width:180px"></audio>`;
                    win.appendChild(div);
                });
                win.scrollTop = win.scrollHeight;
            });
        }
    </script>
</body>
</html>
